<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>TimeBlock Reality</title>
    <link rel="manifest" href="manifest.webmanifest?v=20260702-gcal" />
    <link rel="stylesheet" href="styles.css?v=20260702-gcal" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Plan vs Actual</p>
          <h1>TimeBlock Reality</h1>
        </div>
        <button class="icon-button" id="installButton" hidden title="Install app" aria-label="Install app">+</button>
      </header>

      <section class="status-strip" aria-label="Current block">
        <div>
          <span class="label">Now</span>
          <strong id="activeTitle">No active block</strong>
        </div>
        <button id="endBlockButton" class="secondary-button" disabled>End</button>
      </section>

      <nav class="tabs" aria-label="Primary">
        <button class="tab is-active" data-tab="capture">Capture</button>
        <button class="tab" data-tab="today">Today</button>
        <button class="tab" data-tab="review">Review</button>
        <button class="tab" data-tab="settings">Setup</button>
      </nav>

      <section class="panel is-active" id="capturePanel" aria-labelledby="captureHeading">
        <div class="section-heading">
          <h2 id="captureHeading">LD8 Capture</h2>
          <span id="todayLabel"></span>
        </div>

        <div class="quick-grid" id="quickGrid"></div>

        <form class="entry-form" id="manualForm">
          <label>
            LD8
            <select id="manualCategory"></select>
          </label>
          <div class="form-row">
            <label>
              Start
              <input id="manualStart" type="time" required />
            </label>
            <label>
              End
              <input id="manualEnd" type="time" required />
            </label>
          </div>
          <label>
            Note
            <input id="manualNote" type="text" placeholder="optional" />
          </label>
          <button class="primary-button" type="submit">Add actual block</button>
        </form>
      </section>

      <section class="panel" id="todayPanel" aria-labelledby="todayHeading">
        <div class="section-heading">
          <h2 id="todayHeading">Today</h2>
          <button id="addPlanButton" class="secondary-button">Add plan</button>
        </div>

        <form class="entry-form compact" id="planForm" hidden>
          <label>
            LD8
            <select id="planCategory"></select>
          </label>
          <div class="form-row">
            <label>
              Start
              <input id="planStart" type="time" required />
            </label>
            <label>
              End
              <input id="planEnd" type="time" required />
            </label>
          </div>
          <button class="primary-button" type="submit">Save plan</button>
        </form>

        <div class="timeline-columns">
          <section>
            <div class="mini-heading">Plan</div>
            <div class="block-list" id="planList"></div>
          </section>
          <section>
            <div class="mini-heading">Actual</div>
            <div class="block-list" id="actualList"></div>
          </section>
        </div>
      </section>

      <section class="panel" id="reviewPanel" aria-labelledby="reviewHeading">
        <div class="section-heading">
          <h2 id="reviewHeading">Weekly Review</h2>
          <button id="exportButton" class="secondary-button">Export</button>
        </div>

        <div class="metrics-grid" id="metricsGrid"></div>
        <div class="review-table-wrap">
          <table class="review-table">
            <thead>
              <tr>
                <th>Category</th>
                <th>Plan</th>
                <th>Actual</th>
                <th>Delta</th>
              </tr>
            </thead>
            <tbody id="reviewRows"></tbody>
          </table>
        </div>
        <textarea id="exportText" class="export-box" readonly hidden></textarea>
      </section>

      <section class="panel" id="settingsPanel" aria-labelledby="settingsHeading">
        <div class="section-heading">
          <h2 id="settingsHeading">Setup</h2>
          <button id="resetButton" class="danger-button">Reset local data</button>
        </div>

        <div class="setup-list">
          <div class="setup-actions">
            <button id="connectGoogleButton" class="primary-button" type="button">Connect GCal</button>
            <button id="syncPlanButton" class="secondary-button" type="button" disabled>Sync Plan</button>
          </div>
          <div>
            <span class="label">GCal status</span>
            <strong id="googleStatus">Not connected</strong>
          </div>
          <div>
            <span class="label">Plan calendar</span>
            <strong id="planCalendarStatus">Plan - Week</strong>
          </div>
          <div>
            <span class="label">Actual calendar</span>
            <strong id="actualCalendarStatus">Actual - Time Log</strong>
          </div>
          <div>
            <span class="label">Storage</span>
            <strong>Local device first</strong>
          </div>
        </div>
      </section>
    </main>

    <template id="blockTemplate">
      <article class="time-block">
        <div>
          <strong class="block-title"></strong>
          <span class="block-time"></span>
        </div>
        <div class="block-actions">
          <a class="calendar-link" target="_blank" rel="noreferrer">GCal</a>
          <button class="delete-button" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js?v=20260702-gcal" type="module"></script>
  </body>
</html>
