<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TimeBlock Reality</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2eee6;
        --surface: #fffdfa;
        --surface-strong: #ffffff;
        --ink: #20201c;
        --muted: #726c61;
        --line: #d9d0c2;
        --accent: #166f61;
        --accent-soft: #e6f1ed;
        --blue: #315f8c;
        --blue-soft: #e9f0f8;
        --amber: #ab7027;
        --amber-soft: #f6ebdb;
        --danger: #9b4741;
        --danger-soft: #f5e8e6;
        --shadow: 0 16px 46px rgba(35, 30, 20, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .app-shell {
        position: relative;
        width: min(100vw, 760px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: max(16px, env(safe-area-inset-top)) 14px calc(88px + env(safe-area-inset-bottom));
      }

      .app-header,
      .now-card,
      .last-card,
      .section-heading,
      .timeline-row,
      .metric-card,
      .setting-row,
      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .app-header {
        margin-bottom: 14px;
      }

      .brand,
      .label,
      .block-time,
      .small-status {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .brand {
        letter-spacing: 0.03em;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.02;
      }

      h1 {
        margin-top: 2px;
        font-size: 2rem;
      }

      h2 {
        font-size: 1.14rem;
      }

      h3 {
        font-size: 1rem;
      }

      .date-label {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 850;
      }

      .round-button,
      .end-button,
      .secondary-button,
      .danger-button,
      .nav-button,
      .domain-button,
      .primary-button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--ink);
        cursor: pointer;
        font-weight: 900;
      }

      .round-button {
        width: 38px;
        height: 38px;
        border-radius: 999px;
      }

      .end-button {
        min-width: 68px;
        min-height: 42px;
        border: 0;
        background: var(--ink);
        color: #fff;
      }

      .primary-button {
        width: 100%;
        min-height: 46px;
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .secondary-button,
      .danger-button {
        min-height: 36px;
        padding: 0 11px;
        font-size: 0.82rem;
      }

      .danger-button {
        border-color: rgba(155, 71, 65, 0.35);
        color: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .now-card,
      .last-card,
      .timeline-card,
      .review-card,
      .settings-card,
      .form-card,
      .status-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .now-card {
        padding: 12px;
        margin-bottom: 12px;
      }

      .now-card strong,
      .last-card strong,
      .setting-row strong {
        display: block;
        margin-top: 3px;
      }

      .domain-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .domain-button {
        min-width: 0;
        min-height: 68px;
        font-size: 1.36rem;
        background: var(--surface-strong);
      }

      .domain-button.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .domain-button.compact {
        min-height: 42px;
        font-size: 0.96rem;
      }

      .last-card {
        margin-top: 12px;
        padding: 11px;
        background: var(--accent-soft);
      }

      .last-card.has-error {
        background: var(--danger-soft);
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        margin-top: 6px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #23564e;
        padding: 0 8px;
        font-size: 0.7rem;
        font-weight: 900;
      }

      .status-chip.warn {
        background: var(--amber-soft);
        color: #704a1d;
      }

      .status-chip.bad {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .panel {
        display: none;
      }

      .panel.is-active {
        display: block;
      }

      .section-heading {
        margin: 18px 0 10px;
      }

      .timeline-card,
      .review-card,
      .settings-card,
      .form-card,
      .status-card {
        padding: 12px;
      }

      .timeline-list,
      .review-list,
      .settings-list,
      .log-list {
        display: grid;
        gap: 8px;
      }

      .timeline-row {
        align-items: stretch;
      }

      .timeline-row time {
        width: 42px;
        padding-top: 8px;
        color: var(--muted);
        font-size: 0.7rem;
        font-weight: 900;
      }

      .time-block {
        flex: 1;
        min-height: 42px;
        border-left: 4px solid var(--accent);
        border-radius: 8px;
        background: var(--accent-soft);
        padding: 8px;
      }

      .time-block.plan {
        border-color: var(--blue);
        background: var(--blue-soft);
      }

      .block-title,
      .block-time {
        display: block;
      }

      .block-title {
        font-weight: 900;
      }

      .mini-capture-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        margin-top: 12px;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .metric-card {
        min-height: 66px;
        align-items: flex-start;
        flex-direction: column;
        padding: 10px;
      }

      .metric-card strong {
        font-size: 1.28rem;
      }

      .review-item {
        display: grid;
        gap: 6px;
      }

      .review-item-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.86rem;
        font-weight: 900;
      }

      .bar {
        height: 10px;
        border-radius: 999px;
        background: #ebe3d7;
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }

      .setting-row {
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        padding: 9px;
      }

      .form-card {
        display: grid;
        gap: 10px;
        box-shadow: none;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--ink);
        padding: 0 10px;
        font-weight: 850;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 170px;
        border: 1px dashed #cfc3b4;
        border-radius: 8px;
        background: rgba(255, 253, 250, 0.6);
        text-align: center;
        padding: 18px;
      }

      .empty-state strong {
        display: block;
        margin-bottom: 8px;
      }

      .empty-state span {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 680;
      }

      .bottom-nav {
        position: fixed;
        left: max(14px, env(safe-area-inset-left));
        right: max(14px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
        width: min(calc(100vw - 28px), 732px);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 253, 250, 0.95);
        padding: 6px;
        box-shadow: 0 12px 30px rgba(35, 30, 20, 0.12);
      }

      .nav-button {
        min-height: 40px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .nav-button.is-active {
        background: var(--ink);
        color: #fff;
      }

      .sheet-scrim {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: rgba(30, 28, 22, 0.25);
      }

      .sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        width: min(100vw, 760px);
        margin: 0 auto;
        border-top: 1px solid var(--line);
        border-radius: 20px 20px 0 0;
        background: var(--surface);
        box-shadow: 0 -18px 34px rgba(28, 25, 18, 0.16);
        padding: 14px 14px max(14px, env(safe-area-inset-bottom));
      }

      [hidden] {
        display: none !important;
      }

      @media (min-width: 680px) {
        .app-shell {
          padding-top: 28px;
        }

        .domain-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="brand" id="viewEyebrow">TimeBlock</p>
          <h1 id="viewTitle">Reality</h1>
        </div>
        <div class="date-label" id="todayLabel"></div>
      </header>

      <section class="panel is-active" id="capturePanel">
        <section class="now-card" aria-label="Current block">
          <div>
            <span class="label">Now</span>
            <strong id="activeTitle">No active block</strong>
          </div>
          <button id="endBlockButton" class="end-button" disabled>End</button>
        </section>

        <div class="domain-grid" id="quickGrid"></div>

        <section class="last-card" id="lastBlockCard" aria-label="Last actual block">
          <div>
            <span class="label">Last</span>
            <strong id="lastBlockTitle">No actual yet</strong>
            <span class="status-chip warn" id="lastSyncStatus">Not synced</span>
          </div>
          <div>
            <button id="syncLastButton" class="secondary-button" type="button" disabled>Retry</button>
            <button id="fixLastButton" class="secondary-button" type="button" disabled>Fix</button>
          </div>
        </section>
      </section>

      <section class="panel" id="todayPanel">
        <div class="section-heading">
          <h2>Timeline</h2>
          <button id="syncPlanButton" class="secondary-button">Sync Plan</button>
        </div>
        <section class="timeline-card">
          <div class="timeline-list" id="todayList"></div>
        </section>
        <div class="mini-capture-grid" id="miniCaptureGrid"></div>
      </section>

      <section class="panel" id="morePanel">
        <div class="section-heading">
          <h2>Weekly Review</h2>
          <button id="syncReviewButton" class="secondary-button">Sync Plan</button>
        </div>
        <div class="metrics-grid" id="metricsGrid"></div>
        <section class="review-card">
          <div class="review-list" id="reviewRows"></div>
        </section>

        <div class="section-heading">
          <h2>Calendar</h2>
          <button id="refreshStatusButton" class="secondary-button" type="button">Check</button>
        </div>
        <section class="settings-card">
          <div class="settings-list">
            <div class="setting-row">
              <div>
                <span class="label">Server</span>
                <strong id="serverStatus">Loading...</strong>
              </div>
              <span class="status-chip" id="serverChip">Ready</span>
            </div>
            <div class="setting-row">
              <div>
                <span class="label">Plan source</span>
                <strong id="planCalendarStatus">LD8 calendars</strong>
              </div>
            </div>
            <div class="setting-row">
              <div>
                <span class="label">Actual calendar</span>
                <strong id="actualCalendarStatus">Actual-Time Log</strong>
              </div>
            </div>
            <div class="setting-row">
              <strong>Sync today</strong>
              <button id="syncSetupPlanButton" class="secondary-button" type="button">Run</button>
            </div>
            <div class="setting-row">
              <strong>Reset local cache</strong>
              <button id="resetButton" class="danger-button" type="button">Reset</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-button is-active" data-tab="capture">Capture</button>
      <button class="nav-button" data-tab="today">Today</button>
      <button class="nav-button" data-tab="more">More</button>
    </nav>

    <div class="sheet-scrim" id="fixSheetScrim" hidden></div>
    <section class="sheet" id="fixSheet" aria-label="Fix last block" hidden>
      <div class="sheet-head">
        <div>
          <span class="label">Fix last</span>
          <strong id="fixSheetTitle">No actual yet</strong>
        </div>
        <button class="round-button" id="closeFixSheetButton" type="button" aria-label="Close fix sheet">x</button>
      </div>
      <form class="form-card" id="fixLastForm">
        <label>
          LD8
          <select id="manualCategory"></select>
        </label>
        <div class="form-row">
          <label>
            Start
            <input id="manualStart" type="time" required />
          </label>
          <label>
            End
            <input id="manualEnd" type="time" required />
          </label>
        </div>
        <label>
          Note
          <input id="manualNote" type="text" placeholder="optional" />
        </label>
        <button class="primary-button" type="submit">Save fix</button>
      </form>
    </section>

    <script>
      const categories = [
        { id: "bd", code: "1 BD", name: "Body & Diet" },
        { id: "sp", code: "2 SP", name: "Spiritual & Purpose" },
        { id: "mm", code: "3 MM", name: "Mind & Memory" },
        { id: "rs", code: "4 RS", name: "Relationships & Social" },
        { id: "cm", code: "5 CM", name: "Career & Money" },
        { id: "fn", code: "6 FN", name: "Finance & Numbers" },
        { id: "ct", code: "7 CT", name: "Contribute" },
        { id: "ls", code: "8 LS", name: "Lifestyle" },
      ];

      const storageKey = "timeblock-reality-apps-script-v1";
      const state = loadState();
      const els = {
        viewEyebrow: document.querySelector("#viewEyebrow"),
        viewTitle: document.querySelector("#viewTitle"),
        activeTitle: document.querySelector("#activeTitle"),
        endBlockButton: document.querySelector("#endBlockButton"),
        quickGrid: document.querySelector("#quickGrid"),
        miniCaptureGrid: document.querySelector("#miniCaptureGrid"),
        fixSheet: document.querySelector("#fixSheet"),
        fixSheetScrim: document.querySelector("#fixSheetScrim"),
        fixSheetTitle: document.querySelector("#fixSheetTitle"),
        closeFixSheetButton: document.querySelector("#closeFixSheetButton"),
        fixLastForm: document.querySelector("#fixLastForm"),
        fixLastButton: document.querySelector("#fixLastButton"),
        syncLastButton: document.querySelector("#syncLastButton"),
        lastBlockCard: document.querySelector("#lastBlockCard"),
        lastBlockTitle: document.querySelector("#lastBlockTitle"),
        lastSyncStatus: document.querySelector("#lastSyncStatus"),
        manualCategory: document.querySelector("#manualCategory"),
        manualStart: document.querySelector("#manualStart"),
        manualEnd: document.querySelector("#manualEnd"),
        manualNote: document.querySelector("#manualNote"),
        todayLabel: document.querySelector("#todayLabel"),
        todayList: document.querySelector("#todayList"),
        metricsGrid: document.querySelector("#metricsGrid"),
        reviewRows: document.querySelector("#reviewRows"),
        syncPlanButton: document.querySelector("#syncPlanButton"),
        syncReviewButton: document.querySelector("#syncReviewButton"),
        syncSetupPlanButton: document.querySelector("#syncSetupPlanButton"),
        resetButton: document.querySelector("#resetButton"),
        refreshStatusButton: document.querySelector("#refreshStatusButton"),
        serverStatus: document.querySelector("#serverStatus"),
        serverChip: document.querySelector("#serverChip"),
        planCalendarStatus: document.querySelector("#planCalendarStatus"),
        actualCalendarStatus: document.querySelector("#actualCalendarStatus"),
      };

      init();

      function init() {
        fillSelect(els.manualCategory);
        renderCaptureButtons(els.quickGrid);
        renderCaptureButtons(els.miniCaptureGrid, true);
        setDefaultTimes();
        bindEvents();
        render();
        refreshStatus();
      }

      function bindEvents() {
        document.querySelectorAll(".nav-button").forEach((tab) => {
          tab.addEventListener("click", () => activateTab(tab.dataset.tab));
        });
        els.endBlockButton.addEventListener("click", () => endActiveBlock());
        els.fixLastButton.addEventListener("click", openFixSheet);
        els.syncLastButton.addEventListener("click", retrySyncLastBlock);
        els.closeFixSheetButton.addEventListener("click", closeFixSheet);
        els.fixSheetScrim.addEventListener("click", closeFixSheet);
        els.fixLastForm.addEventListener("submit", fixLastBlock);
        els.syncPlanButton.addEventListener("click", syncPlan);
        els.syncReviewButton.addEventListener("click", syncPlan);
        els.syncSetupPlanButton.addEventListener("click", syncPlan);
        els.refreshStatusButton.addEventListener("click", refreshStatus);
        els.resetButton.addEventListener("click", resetLocalData);
      }

      function activateTab(tabName) {
        const titles = {
          capture: ["TimeBlock", "Reality"],
          today: ["Today", "Plan vs Actual"],
          more: ["More", "Tools"],
        };
        document.querySelectorAll(".nav-button").forEach((tab) => {
          tab.classList.toggle("is-active", tab.dataset.tab === tabName);
        });
        document.querySelectorAll(".panel").forEach((panel) => {
          panel.classList.toggle("is-active", panel.id === `${tabName}Panel`);
        });
        els.viewEyebrow.textContent = titles[tabName][0];
        els.viewTitle.textContent = titles[tabName][1];
      }

      function renderCaptureButtons(container, compact = false) {
        container.innerHTML = "";
        categories.forEach((category) => {
          const button = document.createElement("button");
          button.className = `domain-button${compact ? " compact" : ""}`;
          button.type = "button";
          button.textContent = compact ? category.code.replace(" ", "\n") : category.code;
          button.title = category.name;
          button.addEventListener("click", () => startQuickBlock(category.id));
          container.append(button);
        });
      }

      function fillSelect(select) {
        select.innerHTML = "";
        categories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category.id;
          option.textContent = category.code;
          select.append(option);
        });
      }

      function setDefaultTimes() {
        const now = new Date();
        els.todayLabel.textContent = now.toLocaleDateString("th-TH", {
          weekday: "short",
          day: "numeric",
          month: "short",
        });
        els.manualStart.value = toTimeInput(roundDate(now, 15));
        els.manualEnd.value = toTimeInput(addMinutes(roundDate(now, 15), 30));
      }

      async function startQuickBlock(categoryId) {
        if (state.active) await endActiveBlock(false);
        state.active = {
          id: crypto.randomUUID(),
          categoryId,
          start: new Date().toISOString(),
        };
        saveState();
        render();
        activateTab("capture");
      }

      async function endActiveBlock(shouldRender = true) {
        if (!state.active) return;
        const end = new Date();
        const start = new Date(state.active.start);
        if (end.getTime() - start.getTime() < 60 * 1000) {
          end.setMinutes(end.getMinutes() + 5);
        }
        const block = {
          id: state.active.id,
          categoryId: state.active.categoryId,
          note: "",
          start: state.active.start,
          end: end.toISOString(),
        };
        state.actual.push(block);
        state.active = null;
        saveState();
        await syncActualBlock(block);
        if (shouldRender) render();
      }

      async function syncActualBlock(block) {
        updateSyncStatus("Saving to GCal...");
        try {
          const result = await runServer("createActualBlock", block);
          Object.assign(block, result.block);
          if (result.calendars) applyCalendarStatus(result.calendars);
          saveState();
          updateSyncStatus("Saved to GCal");
        } catch (error) {
          updateSyncStatus(readableError(error), true);
        }
        render();
      }

      async function updateActualBlock(block) {
        updateSyncStatus("Fixing in GCal...");
        try {
          const result = await runServer("updateActualBlock", block);
          Object.assign(block, result.block);
          if (result.calendars) applyCalendarStatus(result.calendars);
          saveState();
          updateSyncStatus("Fixed in GCal");
        } catch (error) {
          updateSyncStatus(readableError(error), true);
        }
        render();
      }

      async function retrySyncLastBlock() {
        const block = getLastActualBlock();
        if (!block) return;
        await syncActualBlock(block);
      }

      function openFixSheet() {
        const block = getLastActualBlock();
        if (!block) return;
        populateFixLastForm(block);
        els.fixSheet.hidden = false;
        els.fixSheetScrim.hidden = false;
      }

      function closeFixSheet() {
        els.fixSheet.hidden = true;
        els.fixSheetScrim.hidden = true;
      }

      function populateFixLastForm(block) {
        els.fixSheetTitle.textContent = `${categoryShortLabel(block.categoryId)} ${formatTime(block.start)}-${formatTime(block.end)}`;
        els.manualCategory.value = block.categoryId;
        els.manualStart.value = toTimeInput(new Date(block.start));
        els.manualEnd.value = toTimeInput(new Date(block.end));
        els.manualNote.value = block.note || "";
      }

      async function fixLastBlock(event) {
        event.preventDefault();
        const block = getLastActualBlock();
        if (!block) return;
        const fixed = buildBlockFromForm(els.manualCategory.value, els.manualStart.value, els.manualEnd.value, els.manualNote.value);
        block.categoryId = fixed.categoryId;
        block.note = fixed.note;
        block.start = fixed.start;
        block.end = fixed.end;
        saveState();
        closeFixSheet();
        await updateActualBlock(block);
        render();
      }

      async function syncPlan() {
        els.serverStatus.textContent = "Syncing plan...";
        els.serverChip.textContent = "Syncing";
        els.serverChip.className = "status-chip warn";
        try {
          const result = await runServer("syncPlanWeek");
          state.plan = result.blocks || [];
          if (result.calendars) applyCalendarStatus(result.calendars);
          saveState();
          render();
          els.serverStatus.textContent = `Synced ${state.plan.length} plan`;
          els.serverChip.textContent = "Ready";
          els.serverChip.className = "status-chip";
        } catch (error) {
          els.serverStatus.textContent = readableError(error);
          els.serverChip.textContent = "Issue";
          els.serverChip.className = "status-chip bad";
        }
      }

      async function refreshStatus() {
        els.serverStatus.textContent = "Checking...";
        els.serverChip.textContent = "Checking";
        els.serverChip.className = "status-chip warn";
        try {
          const result = await runServer("getBootstrapState");
          applyCalendarStatus(result.calendars);
          els.serverStatus.textContent = "Ready";
          els.serverChip.textContent = "Ready";
          els.serverChip.className = "status-chip";
        } catch (error) {
          els.serverStatus.textContent = readableError(error);
          els.serverChip.textContent = "Issue";
          els.serverChip.className = "status-chip bad";
        }
      }

      function buildBlockFromForm(categoryId, startTime, endTime, note) {
        const day = todayDateKey();
        const start = fromDateAndTime(day, startTime);
        let end = fromDateAndTime(day, endTime);
        if (end <= start) end = addMinutes(start, 30);
        return {
          id: crypto.randomUUID(),
          categoryId,
          note: note.trim(),
          start: start.toISOString(),
          end: end.toISOString(),
        };
      }

      function render() {
        renderActive();
        renderLastBlock();
        renderToday();
        renderReview();
      }

      function renderActive() {
        if (!state.active) {
          els.activeTitle.textContent = "No active block";
          els.endBlockButton.disabled = true;
        } else {
          els.activeTitle.textContent = `${categoryShortLabel(state.active.categoryId)} ${formatTime(state.active.start)}`;
          els.endBlockButton.disabled = false;
        }
        [...els.quickGrid.querySelectorAll("button"), ...els.miniCaptureGrid.querySelectorAll("button")].forEach((button) => {
          const category = categories.find((item) => button.title === item.name);
          button.classList.toggle("active", state.active?.categoryId === category?.id);
        });
      }

      function renderLastBlock() {
        const block = getLastActualBlock();
        els.lastBlockCard.classList.remove("has-error");
        if (!block) {
          els.lastBlockTitle.textContent = "No actual yet";
          els.lastSyncStatus.textContent = "Not synced";
          els.lastSyncStatus.className = "status-chip warn";
          els.fixLastButton.disabled = true;
          els.syncLastButton.disabled = true;
          closeFixSheet();
          return;
        }
        els.lastBlockTitle.textContent = `${categoryShortLabel(block.categoryId)} ${formatTime(block.start)}-${formatTime(block.end)}`;
        const isSynced = Boolean(block.googleEventId);
        els.lastSyncStatus.textContent = isSynced ? "Saved to GCal" : "Not saved";
        els.lastSyncStatus.className = `status-chip ${isSynced ? "" : "bad"}`;
        els.lastBlockCard.classList.toggle("has-error", !isSynced);
        els.fixLastButton.disabled = false;
        els.syncLastButton.disabled = isSynced;
      }

      function renderToday() {
        const items = [...state.plan, ...state.actual]
          .filter((block) => dateKey(block.start) === todayDateKey())
          .sort((a, b) => new Date(a.start) - new Date(b.start));
        els.todayList.innerHTML = "";
        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerHTML = "<div><strong>No blocks today</strong><span>Capture from the main page or sync your LD8 plan.</span></div>";
          els.todayList.append(empty);
          return;
        }
        items.forEach((block) => {
          const row = document.createElement("article");
          row.className = "timeline-row";
          const type = block.source === "gcal-plan" ? "Plan" : "Actual";
          const blockClass = type === "Plan" ? "time-block plan" : "time-block";
          row.innerHTML = `<time>${formatTime(block.start)}</time><div class="${blockClass}"><strong class="block-title">${type}: ${categoryShortLabel(block.categoryId)}</strong><span class="block-time">${formatTime(block.start)}-${formatTime(block.end)} · ${minutesBetween(block.start, block.end)}m</span></div>`;
          els.todayList.append(row);
        });
      }

      function renderReview() {
        const start = startOfWeek(new Date());
        const end = addDays(start, 7);
        const planMinutes = totalMinutes(state.plan, start, end);
        const actualMinutes = totalMinutes(state.actual, start, end);
        const adherence = planMinutes ? Math.round((Math.min(planMinutes, actualMinutes) / planMinutes) * 100) : 0;
        els.metricsGrid.innerHTML = "";
        [
          ["Plan", formatHours(planMinutes)],
          ["Actual", formatHours(actualMinutes)],
          ["Match", `${adherence}%`],
          ["Last", getLastActualBlock() ? categoryShortLabel(getLastActualBlock().categoryId) : "-"],
        ].forEach(([label, value]) => {
          const card = document.createElement("div");
          card.className = "metric-card";
          card.innerHTML = `<span class="label">${label}</span><strong>${value}</strong>`;
          els.metricsGrid.append(card);
        });
        els.reviewRows.innerHTML = "";
        const rows = categories
          .map((category) => {
            const planned = totalMinutes(state.plan.filter((block) => block.categoryId === category.id), start, end);
            const actual = totalMinutes(state.actual.filter((block) => block.categoryId === category.id), start, end);
            return { category, planned, actual };
          })
          .filter((row) => row.planned || row.actual);
        if (!rows.length) {
          els.reviewRows.innerHTML = '<div class="empty-state"><div><strong>No weekly data</strong><span>Capture actual blocks or sync your LD8 plan.</span></div></div>';
          return;
        }
        rows.forEach(({ category, planned, actual }) => {
          const item = document.createElement("div");
          item.className = "review-item";
          const max = Math.max(planned, actual, 1);
          const width = Math.max(6, Math.round((actual / max) * 100));
          item.innerHTML = `<div class="review-item-header"><span>${category.code}</span><span>${formatHours(planned)} / ${formatHours(actual)} · ${formatSignedHours(actual - planned)}</span></div><div class="bar"><span style="width: ${width}%"></span></div>`;
          els.reviewRows.append(item);
        });
      }

      function applyCalendarStatus(calendars) {
        if (!calendars) return;
        state.calendars = calendars;
        els.planCalendarStatus.textContent = `${calendars.planFoundCount || 0}/8 LD8 found`;
        els.actualCalendarStatus.textContent = calendars.actualFound ? `${calendars.actualName} found` : "Actual-Time Log missing";
      }

      function updateSyncStatus(status, isError = false) {
        els.lastSyncStatus.textContent = status;
        els.lastSyncStatus.className = `status-chip ${isError ? "bad" : "warn"}`;
        els.serverStatus.textContent = status;
        els.serverChip.textContent = isError ? "Issue" : "Ready";
        els.serverChip.className = `status-chip ${isError ? "bad" : ""}`;
      }

      function resetLocalData() {
        if (!confirm("Reset data on this device?")) return;
        localStorage.removeItem(storageKey);
        state.plan = [];
        state.actual = [];
        state.active = null;
        saveState();
        render();
        activateTab("capture");
      }

      function runServer(functionName, ...args) {
        return new Promise((resolve, reject) => {
          if (!window.google?.script?.run) {
            reject(new Error("Deploy as Apps Script web app"));
            return;
          }
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[functionName](...args);
        });
      }

      function readableError(error) {
        return error && error.message ? error.message : "Server error";
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey)) || {};
          return {
            plan: Array.isArray(saved.plan) ? saved.plan : [],
            actual: Array.isArray(saved.actual) ? saved.actual : [],
            active: saved.active || null,
            calendars: saved.calendars || null,
          };
        } catch {
          return { plan: [], actual: [], active: null, calendars: null };
        }
      }

      function saveState() {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function categoryShortLabel(id) {
        return categories.find((category) => category.id === id)?.code || id;
      }

      function getLastActualBlock() {
        return state.actual[state.actual.length - 1];
      }

      function todayDateKey() {
        return dateKey(new Date());
      }

      function dateKey(value) {
        const date = new Date(value);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function fromDateAndTime(day, time) {
        return new Date(`${day}T${time}:00`);
      }

      function toTimeInput(date) {
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function formatTime(value) {
        return new Date(value).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
      }

      function minutesBetween(start, end) {
        return Math.max(0, Math.round((new Date(end) - new Date(start)) / 60000));
      }

      function totalMinutes(blocks, start, end) {
        return blocks
          .filter((block) => new Date(block.start) >= start && new Date(block.start) < end)
          .reduce((sum, block) => sum + minutesBetween(block.start, block.end), 0);
      }

      function formatHours(minutes) {
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return mins ? `${hours}h ${mins}m` : `${hours}h`;
      }

      function formatSignedHours(minutes) {
        const sign = minutes > 0 ? "+" : "";
        return `${sign}${formatHours(minutes)}`;
      }

      function roundDate(date, stepMinutes) {
        const ms = stepMinutes * 60 * 1000;
        return new Date(Math.round(date.getTime() / ms) * ms);
      }

      function addMinutes(date, minutes) {
        const next = new Date(date);
        next.setMinutes(next.getMinutes() + minutes);
        return next;
      }

      function addDays(date, days) {
        const next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
      }

      function startOfWeek(date) {
        const current = new Date(date);
        const day = current.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        current.setHours(0, 0, 0, 0);
        current.setDate(current.getDate() + diff);
        return current;
      }
    </script>
  </body>
</html>
